name: Build Windows Desktop App

# Runs on every push to main, and can also be triggered manually from the
# Actions tab (Run workflow button) whenever you want a fresh build.
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build the Windows installer(s)
        run: npm run desktop:build

      # NSIS installer (.exe)
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: GV-OS-Windows-Installer-exe
          path: src-tauri/target/release/bundle/nsis/*.exe

      # MSI installer
      - name: Upload MSI installer
        uses: actions/upload-artifact@v4
        with:
          name: GV-OS-Windows-Installer-msi
          path: src-tauri/target/release/bundle/msi/*.msi
